<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Council of Biys — Interactive UI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; margin: 0; font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const AGENTS = [
          {
            id: 'auditor',
            name: 'Auditor',
            role: 'Fact-checker',
            icon: '🛡',
            thoughts: [
              'Scanning GPS coordinates: 48.8584° N, 2.2945° E',
              'Verifying timestamp: 2026-05-06T10:30:00Z',
              'Checking mission logic: Humanitarian Aid Branch',
              'GPS data verified. Timestamp matches upload metadata.'
            ]
          },
          {
            id: 'skeptic',
            name: 'Skeptic',
            role: 'Fraud Detector',
            icon: '🕵',
            thoughts: [
              'Performing pixel forensics...',
              'Analyzing shadow geometry...',
              'Deepfake detection confidence: 0.02%',
              'Metadata consistency check passed.'
            ],
            alertThoughts: [
              'Wait, the shadow geometry in this photo looks AI-generated.',
              'Potential pixel manipulation detected at (120, 240).',
              'Flagging for manual review: ARAM detected.',
            ]
          },
          {
            id: 'social',
            name: 'Social Biy',
            role: 'Impact Evaluator',
            icon: '✨',
            thoughts: [
              'Evaluating community impact (Asar level)...',
              'Analyzing sincerity in contributor notes...',
              'Social Lift potential: +4.2 Aura points.',
              'Positive impact confirmed.'
            ]
          },
          {
            id: 'master',
            name: 'Master Biy',
            role: 'Consensus Judge',
            icon: '⚖',
            thoughts: [
              'Synthesizing agent reports...',
              'Auditor weight: 0.4 | Skeptic weight: 0.4 | Social weight: 0.2',
              'Integrity Manifest generation initiated.'
            ]
          }
        ];

        const BiyCouncil = () => {
          const [activeStep, setActiveStep] = useState(-1);
          const [status, setStatus] = useState('idle'); // idle, running, adal, aram
          const [logs, setLogs] = useState([]);
          const [manifest, setManifest] = useState(null);

          const runSimulation = (mode) => {
            setLogs([]);
            setActiveStep(0);
            setStatus(mode === 'adal' ? 'running' : 'running-aram');
            setManifest(null);
          };

          useEffect(() => {
            if ((status === 'running' || status === 'running-aram') && activeStep >= 0 && activeStep < 4) {
              const currentAgent = AGENTS[activeStep];
              const isFailing = status === 'running-aram' && activeStep === 1;
              const thoughtBatch = isFailing ? currentAgent.alertThoughts : currentAgent.thoughts;

              const timer = setTimeout(() => {
                if (activeStep < 3) {
                  if (isFailing) {
                    setStatus('aram');
                    generateManifest('aram');
                  } else {
                    setActiveStep(prev => prev + 1);
                  }
                } else {
                  setStatus('adal');
                  generateManifest('adal');
                }
              }, 2500);

              const addLogs = setInterval(() => {
                const txt = thoughtBatch[Math.floor(Math.random() * thoughtBatch.length)];
                setLogs(prev => [...prev, `${currentAgent.name.toUpperCase()}: ${txt}`].slice(-8));
              }, 600);

              return () => { clearTimeout(timer); clearInterval(addLogs); };
            }
          }, [activeStep, status]);

          const generateManifest = (v) => {
            setManifest({
              protocol: "ProtoQol-v1",
              timestamp: new Date().toISOString(),
              verdict: v.toUpperCase(),
              hash: "SHA256:e3b0c442..."
            });
          };

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 p-8 font-mono">
              <div className="max-w-6xl mx-auto">
                <header className="mb-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                  <div>
                    <h1 className="text-4xl font-black tracking-tighter text-cyan-400 mb-2 underline decoration-cyan-400/30">COUNCIL OF BIYS</h1>
                    <p className="text-slate-500 uppercase text-[10px] tracking-widest">Multi-Agent Deliberation UI // System ID: PQ-029</p>
                  </div>
                  <div className="flex gap-4">
                    <button onClick={() => runSimulation('adal')} className="px-6 py-2 border border-cyan-400/50 text-cyan-400 hover:bg-cyan-400 hover:text-slate-900 transition-all text-xs font-bold uppercase">Simulate ADAL</button>
                    <button onClick={() => runSimulation('aram')} className="px-6 py-2 border border-red-400/50 text-red-400 hover:bg-red-400 hover:text-slate-900 transition-all text-xs font-bold uppercase">Simulate ARAM</button>
                  </div>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                  {AGENTS.map((agent, idx) => (
                    <div key={agent.id} className={`p-6 rounded-2xl border transition-all duration-500 ${activeStep === idx ? 'border-cyan-400/50 bg-slate-900 shadow-[0_0_30px_rgba(34,211,238,0.1)]' : (status === 'aram' && agent.id === 'skeptic') ? 'border-red-400 bg-red-950/20' : 'border-slate-800 bg-slate-900/40 opacity-60'}`}>
                      <div className="text-3xl mb-4">{agent.icon}</div>
                      <h3 className="text-xl font-black tracking-tighter mb-1 uppercase">{agent.name}</h3>
                      <p className="text-[10px] text-slate-500 uppercase mb-4">{agent.role}</p>
                      <div className="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                         {activeStep === idx && <motion.div initial={{width: 0}} animate={{width: '100%'}} transition={{duration: 2.5}} className={`h-full ${status === 'running-aram' && idx === 1 ? 'bg-red-400' : 'bg-cyan-400'}`} />}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div className="bg-black/40 border border-slate-800 p-6 rounded-lg backdrop-blur-xl h-[300px]">
                    <div className="text-[10px] text-slate-500 uppercase tracking-widest mb-4">Live Thought Stream</div>
                    <div className="space-y-1">
                      {logs.map((log, i) => <div key={i} className="text-[11px] text-cyan-400/80 font-mono"><span className="text-slate-700 mr-2">{">>>"}</span>{log}</div>)}
                    </div>
                  </div>

                  <AnimatePresence>
                    {manifest && (
                      <motion.div initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} className={`p-6 rounded-lg border ${status === 'aram' ? 'border-red-500/30 bg-red-950/10' : 'border-cyan-500/30 bg-cyan-950/10'}`}>
                        <div className="flex justify-between items-center mb-4">
                            <div className="text-[10px] uppercase tracking-widest text-slate-400">Signed Integrity Manifest</div>
                            <div className={`px-2 py-0.5 rounded text-[9px] font-black ${status === 'aram' ? 'bg-red-500 text-white' : 'bg-cyan-400 text-black'}`}>
                                {status === 'aram' ? 'BLOCK' : 'VERIFY'}
                            </div>
                        </div>
                        <pre className="text-[10px] text-slate-400">{JSON.stringify(manifest, null, 2)}</pre>
                      </motion.div>
                    )}
                  </AnimatePresence>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BiyCouncil />);
    </script>
</body>
</html>
